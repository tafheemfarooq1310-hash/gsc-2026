
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Intracore Registration | Kashmir Circuit 2026</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="logo.jpg" />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .font-serif {
        font-family: "Playfair Display", serif;
      }

      #mobileMenu {
        transition: opacity 0.3s ease;
      }

      input {
        width: 100%;
        padding: 18px 20px;
        border: 1px solid black;
        outline: none;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        transition: all 0.3s ease;
        background: white;
      }

      input::placeholder {
        color: #888;
        font-size: 11px;
        letter-spacing: 0.25em;
      }

      input:focus {
        background: #f8fafc;
        border-color: #64748b;
      }

      .disabled-btn {
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>

  <body
    class="bg-white text-black antialiased selection:bg-black selection:text-white"
  >
    <!-- NAVBAR -->
    <nav
      class="flex justify-between items-center px-6 md:px-16 py-6 border-b border-black bg-white sticky top-0 z-50"
    >
      <!-- Logo -->
      <div class="flex items-center space-x-4">
        <a href="index.html">
          <img
            src="logo.jpg"
            alt="GSC 2026"
            class="w-10 h-10 md:w-14 md:h-14 object-cover rounded-full border border-black"
          />
        </a>

        <div class="flex flex-col">
          <span
            class="text-xl md:text-2xl font-bold tracking-tighter uppercase leading-none"
          >
            GSC
          </span>

          <span
            class="text-[8px] md:text-xs font-light text-slate-400 tracking-[0.2em] uppercase"
          >
            Kashmir Circuit
          </span>
        </div>
      </div>

      <!-- Desktop Menu -->
      <div
        class="hidden md:flex space-x-10 uppercase text-[10px] tracking-[0.3em] font-bold"
      >
        <a href="index.html" class="hover:text-slate-400 transition">Home</a>
        <a href="intracore.html" class="hover:text-slate-400 transition"
          >Intracore</a
        >
        <a href="about.html" class="hover:text-slate-400 transition">About</a>
        <a href="contact.html" class="hover:text-slate-400 transition"
          >Contact</a
        >
      </div>

      <!-- Mobile Button -->
      <div class="md:hidden">
        <button
          id="menuBtn"
          class="text-[10px] font-bold uppercase border border-black px-4 py-2"
        >
          Menu
        </button>
      </div>
    </nav>

    <!-- MOBILE MENU -->
    <div
      id="mobileMenu"
      class="fixed inset-0 bg-white z-[100] hidden flex-col items-center justify-center space-y-10 uppercase tracking-[0.4em] text-xl font-light"
    >
      <button
        id="closeBtn"
        class="absolute top-10 right-8 text-[10px] font-bold border border-black px-4 py-2"
      >
        [ Close ]
      </button>

      <a href="index.html">Home</a>
      <a href="intracore.html">Intracore</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>

    <!-- HERO -->
    <header class="py-20 px-6 md:px-16 border-b border-black">
      <div class="max-w-4xl">
        <h1
          class="text-6xl md:text-8xl font-bold uppercase tracking-tighter leading-none mb-6"
        >
          Registration
        </h1>

        <p class="font-serif italic text-2xl text-slate-500">
          Intracore Knowledge Grid Phase 01
        </p>
      </div>
    </header>

    <!-- FORM -->
    <section class="py-20 px-6 md:px-16">
      <form
        id="registrationForm"
        action="https://docs.google.com/forms/d/e/1FAIpQLScyP6yBkrAqe_IQL8FgE-iCUrklKud1xecXJ8sqkXFKJHHhBw/formResponse"
        method="POST"
        target="hidden_iframe"
        class="space-y-6 max-w-3xl"
      >
        <!-- EMAIL -->
        <input
          type="email"
          name="entry.340603808"
          placeholder="Email Address"
          required
        />

        <!-- NAME -->
        <input
          type="text"
          name="entry.1019357638"
          placeholder="Full Name"
          required
        />

        <!-- SCHOOL -->
        <input
          type="text"
          name="entry.1547293366"
          placeholder="School Name"
          required
        />

        <!-- GRADE -->
        <input
          type="text"
          name="entry.1879762670"
          placeholder="Grade"
          required
        />

        <!-- PHONE -->
        <input
          type="tel"
          name="entry.259468870"
          placeholder="Phone Number"
          required
        />

        <!-- SUBMIT -->
        <button
          id="submitBtn"
          type="submit"
          class="w-full md:w-auto bg-black text-white px-12 py-5 uppercase text-[10px] font-bold tracking-[0.4em] hover:bg-slate-800 transition-all active:scale-95"
        >
          Register Now →
        </button>
      </form>

      <!-- Hidden iframe -->
      <iframe
        name="hidden_iframe"
        id="hidden_iframe"
        style="display: none"
      ></iframe>
    </section>

    <!-- FOOTER -->
    <footer class="py-10 border-t border-black text-center">
      <p class="text-[10px] uppercase tracking-[0.3em] font-bold">
        © 2026 Global Scholars Championship
      </p>
    </footer>

    <!-- JAVASCRIPT -->
    <script>
      // Mobile Menu
      const menu = document.getElementById("mobileMenu");
      const menuBtn = document.getElementById("menuBtn");
      const closeBtn = document.getElementById("closeBtn");

      menuBtn.addEventListener("click", () => {
        menu.classList.remove("hidden");
        menu.classList.add("flex");
        document.body.style.overflow = "hidden";
      });

      closeBtn.addEventListener("click", closeMenu);

      document.querySelectorAll("#mobileMenu a").forEach((link) => {
        link.addEventListener("click", closeMenu);
      });

      function closeMenu() {
        menu.classList.add("hidden");
        menu.classList.remove("flex");
        document.body.style.overflow = "auto";
      }

      // Form Submission
      const form = document.getElementById("registrationForm");
      const submitBtn = document.getElementById("submitBtn");
      const iframe = document.getElementById("hidden_iframe");

      let submitted = false;

      form.addEventListener("submit", () => {
        submitted = true;

        submitBtn.innerHTML = "Submitting...";
        submitBtn.classList.add("disabled-btn");
      });

      iframe.addEventListener("load", () => {
        if (submitted) {
          form.reset();

          submitBtn.innerHTML = "Registration Submitted ✓";

          setTimeout(() => {
            submitBtn.innerHTML = "Register Now →";
            submitBtn.classList.remove("disabled-btn");
          }, 3000);

          alert("Registration submitted successfully!");
        }
      });
    </script>
  </body>
</html>
