<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholar Entry | GSC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      h1 {
        font-family: "Playfair Display", serif;
      }
      input:focus {
        border-color: #000;
        outline: none;
      }
      .input-field {
        width: 100%;
        border: none;
        border-bottom: 2px solid black;
        padding: 16px 0;
        font-size: 1.25rem;
        font-weight: 300;
        transition: all 0.3s ease;
        border-radius: 0;
      }
      .input-field::placeholder {
        color: #e2e8f0;
      }
    </style>
  </head>
  <body class="bg-white text-black antialiased">
    <nav
      class="flex justify-between items-center px-6 md:px-16 py-8 border-b border-black"
    >
      <div class="text-3xl font-bold tracking-tighter uppercase">
        GSC <span class="font-light text-slate-400">2026</span>
      </div>
      <div
        class="hidden md:flex space-x-12 uppercase text-xs tracking-widest font-bold"
      >
        <a href="index.html" class="hover:underline">Home</a>
        <a href="about.html" class="hover:underline">About</a>
        <a href="contact.html" class="hover:underline">Contact</a>
      </div>
    </nav>

    <header class="py-16 px-6 md:px-16 border-b border-black">
      <h1 class="text-5xl md:text-7xl italic mb-6">Scholar Entry.</h1>
      <div class="bg-black text-white p-6 max-w-2xl">
        <p
          class="text-[10px] uppercase tracking-[0.2em] font-bold mb-2 text-slate-400"
        >
          Notice
        </p>
        <p class="text-sm leading-relaxed uppercase tracking-tight font-medium">
          Individual scholarship entry for the Kashmir Circuit. Please ensure
          all contact details are active for verification.
        </p>
      </div>
    </header>

    <section class="py-20 px-6 md:px-16 max-w-3xl">
      <form
        action="https://docs.google.com/forms/d/e/1FAIpQLSe9_D81QZI3hZUmxynqggr6FhjAn5WzYo47kGrDwQDEjhwNZA/formResponse"
        method="POST"
        target="_self"
        class="space-y-12"
      >
        <div>
          <label
            class="block text-xs font-bold uppercase tracking-[0.3em] mb-2 text-slate-400"
            >Full Name of Scholar</label
          >
          <input
            type="text"
            name="entry.999569983"
            required
            placeholder="FULL NAME"
            class="input-field uppercase"
          />
        </div>

        <div>
          <label
            class="block text-xs font-bold uppercase tracking-[0.3em] mb-2 text-slate-400"
            >Representing Institution</label
          >
          <input
            type="text"
            name="entry.1958852631"
            required
            placeholder="SCHOOL NAME"
            class="input-field uppercase"
          />
        </div>

        <div>
          <label
            class="block text-xs font-bold uppercase tracking-[0.3em] mb-2 text-slate-400"
            >Grade / Class</label
          >
          <input
            type="text"
            name="entry.953795456"
            required
            placeholder="E.G. CLASS 8"
            class="input-field uppercase"
          />
        </div>

        <div>
          <label
            class="block text-xs font-bold uppercase tracking-[0.3em] mb-2 text-slate-400"
            >Contact Email</label
          >
          <input
            type="email"
            name="entry.1969730168"
            required
            placeholder="EMAIL@EXAMPLE.COM"
            class="input-field"
          />
        </div>

        <div>
          <label
            class="block text-xs font-bold uppercase tracking-[0.3em] mb-2 text-black font-bold"
            >Contact Number</label
          >
          <p class="text-[10px] text-slate-400 mb-2 italic">
            Verification and Phase 1 updates will be sent here.
          </p>
          <input
            type="tel"
            name="entry.1013759020"
            required
            placeholder="+91 XXXX-XXXXXX"
            class="input-field"
          />
        </div>

        <div class="pt-10">
          <button
            type="submit"
            class="bg-black text-white px-16 py-6 font-bold uppercase tracking-widest text-sm hover:invert transition duration-300 w-full md:w-auto"
          >
            Submit Enrollment
          </button>
        </div>
      </form>
    </section>

    <footer
      class="py-10 px-6 md:px-16 border-t border-black text-[10px] uppercase tracking-widest font-bold text-slate-400"
    >
      © 2026 GSC Kashmir Circuit // Official Student Registration Portal.
    </footer>
  </body>
</html>
